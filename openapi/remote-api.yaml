openapi: 3.1.0
info:
  title: SoftDMX Remote API
  version: 1.0.0
  description: |
    HTTP REST surface for SoftDMX remote control. Mirrors write events documented in
    [docs/api.md](../docs/api.md). Socket.IO remains the primary real-time channel;
    REST routes emit the same `remote:*` events on the server.

    Optional auth: set `SOFTDMX_API_TOKEN` on the server. Clients send the token via
    `Authorization: Bearer <token>` or `x-api-token: <token>`.
servers:
  - url: http://127.0.0.1:5353/api/v1/remote
    description: Default local SoftDMX server (port 5353)
security:
  - bearerAuth: []
  - apiKeyAuth: []
paths:
  /show:
    get:
      operationId: getShow
      summary: Get current show document
      security: []
      responses:
        '200':
          description: Current show document
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShowDocument'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: No show loaded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      operationId: loadShow
      summary: Load full show document
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ShowDocument'
      responses:
        '200':
          description: Show loaded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'
        '400':
          description: Invalid show document payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /scratch:
    get:
      operationId: getScratch
      summary: Get canonical scratch snapshot
      responses:
        '200':
          description: Scratch layers, conflicts, and merged output
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScratchSnapshot'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /scratch/clients:
    get:
      operationId: getScratchClients
      summary: List scratch clients and per-client layers
      responses:
        '200':
          description: Client list and layers
          content:
            application/json:
              schema:
                type: object
                required: [clients, layers]
                properties:
                  clients:
                    type: array
                    items:
                      $ref: '#/components/schemas/ClientIdentity'
                  layers:
                    type: array
                    items:
                      $ref: '#/components/schemas/ScratchClientLayer'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /sessions:
    get:
      operationId: listSessions
      summary: List programmer sessions from loaded show
      responses:
        '200':
          description: Session list
          content:
            application/json:
              schema:
                type: object
                required: [sessions]
                properties:
                  sessions:
                    type: array
                    items:
                      $ref: '#/components/schemas/ProgrammerSession'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /sessions/arm:
    post:
      operationId: armSession
      summary: Arm programmer session recording
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                sessionId:
                  type: string
                clock:
                  type: string
                  enum: [session, set-playhead, timecode, audio]
      responses:
        '200':
          description: Session armed
          content:
            application/json:
              schema:
                type: object
                required: [ok, sessionId]
                properties:
                  ok:
                    type: boolean
                  sessionId:
                    type: string
        '401':
          $ref: '#/components/responses/Unauthorized'

  /sessions/disarm:
    post:
      operationId: disarmSession
      summary: Disarm programmer session recording
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                sessionId:
                  type: string
                persist:
                  type: boolean
      responses:
        '200':
          description: Session disarmed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /sessions/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    get:
      operationId: getSession
      summary: Get one programmer session
      responses:
        '200':
          description: Programmer session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProgrammerSession'
        '404':
          description: Session not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /scratch/set:
    post:
      operationId: scratchSet
      summary: Set live scratch channel values
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: '#/components/schemas/ScratchChannel'
                - type: object
                  required: [channels]
                  properties:
                    channels:
                      type: array
                      items:
                        $ref: '#/components/schemas/ScratchChannel'
      responses:
        '200':
          description: Scratch values emitted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /scratch/clear:
    post:
      operationId: scratchClear
      summary: Clear scratch layer
      responses:
        '200':
          description: Scratch layer cleared
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /preset/fire:
    post:
      operationId: firePreset
      summary: Fire preset with optional fade
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PresetFireRequest'
      responses:
        '200':
          description: Preset fire emitted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /cue/play:
    post:
      operationId: playCue
      summary: Start cue playback
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CueRequest'
      responses:
        '200':
          description: Cue play emitted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /cue/stop:
    post:
      operationId: stopCue
      summary: Stop cue playback
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CueRequest'
      responses:
        '200':
          description: Cue stop emitted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /cue/stack/go:
    post:
      operationId: stackCueGo
      summary: Advance stack cue
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CueRequest'
      responses:
        '200':
          description: Stack go emitted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /blackout:
    post:
      operationId: setBlackout
      summary: Toggle blackout on/off
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - type: boolean
                - type: object
                  required: [value]
                  properties:
                    value:
                      type: boolean
      responses:
        '200':
          description: Blackout state emitted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /grandmaster:
    post:
      operationId: setGrandmaster
      summary: Set grand master level (0–1)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - type: number
                  minimum: 0
                  maximum: 1
                - type: object
                  required: [value]
                  properties:
                    value:
                      type: number
                      minimum: 0
                      maximum: 1
      responses:
        '200':
          description: Grand master level emitted (clamped 0–1)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /audio/enabled:
    post:
      operationId: setAudioEnabled
      summary: Enable or disable audio-reactive mappings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - type: boolean
                - type: object
                  required: [enabled]
                  properties:
                    enabled:
                      type: boolean
      responses:
        '200':
          description: Audio enabled state emitted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /audio/mappings:
    post:
      operationId: createAudioMapping
      summary: Create audio mapping
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [mapping]
              properties:
                mapping:
                  $ref: '#/components/schemas/ShowAudioMapping'
      responses:
        '200':
          description: Mapping create emitted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'
        '400':
          description: Invalid mapping payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /audio/mappings/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    patch:
      operationId: updateAudioMapping
      summary: Update audio mapping fields
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                mapping:
                  type: object
                  additionalProperties: true
      responses:
        '200':
          description: Mapping update emitted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'
        '400':
          description: Invalid mapping id
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
    delete:
      operationId: deleteAudioMapping
      summary: Delete audio mapping
      responses:
        '200':
          description: Mapping delete emitted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'
        '400':
          description: Invalid mapping id
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /channel/set:
    post:
      operationId: setChannel
      summary: Set one channel via scratch
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ScratchChannel'
      responses:
        '200':
          description: Channel value emitted via scratch
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: Set `SOFTDMX_API_TOKEN` on the server; send `Authorization: Bearer <token>`
    apiKeyAuth:
      type: apiKey
      in: header
      name: x-api-token
      description: Alternative header auth when `SOFTDMX_API_TOKEN` is set

  responses:
    Unauthorized:
      description: Missing or invalid API token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    OkResponse:
      type: object
      required: [ok]
      properties:
        ok:
          type: boolean
          const: true

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string

    ScratchChannel:
      type: object
      required: [path, value]
      properties:
        path:
          type: string
          description: Channel path (e.g. show://Fixture/1)
        value:
          type: number
        attributeType:
          type: string
          default: generic
        clientId:
          type: string

    ScratchCommandAck:
      type: object
      required: [seq, clientId, appliedAt]
      properties:
        seq:
          type: integer
        clientId:
          type: string
        appliedAt:
          type: integer

    ClientIdentity:
      type: object
      required: [clientId]
      properties:
        clientId:
          type: string
        operatorLabel:
          type: string
        color:
          type: string
        priority:
          type: number

    ScratchClientLayer:
      type: object
      required: [clientId, entries]
      properties:
        clientId:
          type: string
        operatorLabel:
          type: string
        color:
          type: string
        priority:
          type: number
        entries:
          type: array
          items:
            type: object
        lastSeq:
          type: integer

    ScratchSnapshot:
      type: object
      required: [seq, layers, conflicts, merged]
      properties:
        seq:
          type: integer
        layers:
          type: array
          items:
            $ref: '#/components/schemas/ScratchClientLayer'
        conflicts:
          type: array
          items:
            type: object
        merged:
          type: array
          items:
            type: object

    ProgrammerSession:
      type: object
      required: [id, name, anchorSec, startedAt, clock, events]
      properties:
        id:
          type: string
        name:
          type: string
        anchorSec:
          type: number
        startedAt:
          type: string
        endedAt:
          type: string
        clock:
          type: string
        events:
          type: array
          items:
            type: object

    PresetFireRequest:
      type: object
      required: [presetId]
      properties:
        presetId:
          type: string
        fade:
          type: number
          description: Optional fade duration in milliseconds

    CueRequest:
      type: object
      required: [cueId]
      properties:
        cueId:
          type: string

    ShowAudioMapping:
      type: object
      required: [id, source, targetType, targetId]
      properties:
        id:
          type: string
        source:
          type: string
          enum: [rms, peak, beat, band]
        bandIndex:
          type: integer
          enum: [0, 1, 2, 3]
        targetType:
          type: string
          enum: [fixture, group, effect, executor, submaster]
        targetId:
          type: string
        attribute:
          type: string
        gain:
          type: number
        offset:
          type: number
        enabled:
          type: boolean
        invert:
          type: boolean
        min:
          type: number
        max:
          type: number
        attackMs:
          type: number
        releaseMs:
          type: number

    ShowDocument:
      type: object
      required: [version, meta]
      description: |
        SoftDMX show document. Supported versions are 1.0–1.5 (see `src/show/version.ts`).
      properties:
        version:
          type: string
          enum: ['1.0', '1.1', '1.2', '1.3', '1.4', '1.5']
        meta:
          type: object
          required: [name]
          properties:
            name:
              type: string
            created:
              type: string
              format: date-time
            modified:
              type: string
              format: date-time
        plugins:
          type: array
          items:
            type: string
        destinations:
          type: array
          items:
            type: object
        fixtures:
          type: array
          items:
            type: object
        groups:
          type: array
          items:
            type: object
        presets:
          type: array
          items:
            type: object
        effects:
          type: array
          items:
            type: object
        cues:
          type: array
          items:
            type: object
        bindings:
          type: object
        audioMappings:
          type: array
          items:
            $ref: '#/components/schemas/ShowAudioMapping'
        executors:
          type: array
          items:
            type: object
        submasters:
          type: array
          items:
            type: object
      additionalProperties: true
