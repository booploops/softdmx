name: Fuzz

on:
  push:
    branches:
      - '**'
  workflow_dispatch:

jobs:
  fuzz:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable Corepack
        run: |
          corepack enable
          corepack prepare yarn@4.17.0 --activate

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: package.json
          cache: yarn
          corepack: true

      - name: Install dependencies
        run: yarn workspaces focus @softdmx/frontend

      - name: Run fuzz harnesses
        run: yarn test:fuzz:ci
