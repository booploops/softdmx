name: CI

on:
  push:
    branches:
      - '**'

jobs:
  test-and-build-spa:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable Corepack
        run: |
          corepack enable
          corepack prepare yarn@4.9.2 --activate

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
          corepack: true

      - name: Verify Yarn version
        run: yarn --version

      - name: Install dependencies
        run: yarn install --immutable

      - name: Run tests
        run: yarn test

      - name: Build SPA
        run: yarn build:spa

  electron-build:
    runs-on: macos-latest
    timeout-minutes: 30
    needs: test-and-build-spa

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable Corepack
        run: |
          corepack enable
          corepack prepare yarn@4.9.2 --activate

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
          corepack: true

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build Electron
        run: yarn build
