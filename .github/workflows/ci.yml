name: CI

on:
  push:
    branches:
      - '**'

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable Corepack
        run: |
          corepack enable
          corepack prepare yarn@4.17.0 --activate

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: package.json
          cache: yarn
          corepack: true

      - name: Verify Yarn version
        run: yarn --version

      - name: Install dependencies
        run: yarn workspaces focus @softdmx/frontend

      - name: Run tests with coverage
        run: yarn workspace @softdmx/frontend test:coverage

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: packages/frontend/coverage/
          retention-days: 14

  build-spa:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable Corepack
        run: |
          corepack enable
          corepack prepare yarn@4.17.0 --activate

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: package.json
          cache: yarn
          corepack: true

      - name: Install dependencies
        run: yarn workspaces focus @softdmx/frontend

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Build SPA
        run: yarn build:frontend

  electron-build:
    runs-on: macos-latest
    timeout-minutes: 30
    needs: build-spa

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable Corepack
        run: |
          corepack enable
          corepack prepare yarn@4.17.0 --activate

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: package.json
          cache: yarn
          corepack: true

      - name: Install dependencies
        run: yarn install --immutable

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Build Electron
        run: |
          yarn build
          yarn workspace @softdmx/client dist --dir
