id: VRSL_Wash_5CH
name: VRSL Wash (5ch)
channels:
  - name: Dimmer
    type: intensity
    minValue: 0
    maxValue: 255
    defaultValue: 255
  - name: Red
    type: color
    minValue: 0
    maxValue: 255
    defaultValue: 128
  - name: Green
    type: color
    minValue: 0
    maxValue: 255
    defaultValue: 128
  - name: Blue
    type: color
    minValue: 0
    maxValue: 255
    defaultValue: 128
  - name: Strobe
    type: effect
    minValue: 0
    maxValue: 255
    defaultValue: 0
widgets:
  - type: colorPicker
    name: RGB Color
    channels:
      redChannel: Red
      greenChannel: Green
      blueChannel: Blue
  - type: dimmerSlider
    name: Intensity
    channels:
      dimmerChannel: Dimmer
  - type: strobe
    name: Strobe Effect
    channels:
      strobeChannel: Strobe
